<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AbyssalCards</title>
    <link rel="stylesheet" href="css/modern-normalize.css">
    <link rel="stylesheet" href="css/system.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/lib/vivus.js"></script>
    <script src="js/lib/isomer.js"></script>
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div id="game-ui">
      <header class="title-bar">
        <button type="button" class="close hidden"><span>Close</span></button>
        <span class="title" style="color:white">AbyssalCards</span>
        <button type="button" class="resize hidden"><span>Resize</span></button>
      </header>

      <div id="controls">
        <div id="resources">
          <div class="resource" id="mana-display">
            <span class="resource-label">Mana</span>
            <span class="resource-value" id="mana">0</span>
          </div>
          <div class="resource" id="energy-display">
            <span class="resource-label">Energy</span>
            <span class="resource-value" id="energy">0</span>
          </div>
          <div class="resource" id="control-display">
            <span class="resource-label">Control</span>
            <span class="resource-value" id="control">0</span>
          </div>
        </div>
      </div>

      <div id="board-layout">
        <aside class="window" id="left-panel">
          <header class="title-bar">
            <button type="button" class="close hidden"><span>Close</span></button>
            <span class="title">Programs</span>
            <button type="button" class="minimize" aria-label="Minimize"><span>Minimize</span></button>
          </header>
          <div class="window-pane">
            <div class="btn-group">
              <button type="button" class="btn" onclick="addRandomCard()">Random</button>
              <button type="button" class="btn" onclick="addRandomHand(5)">Draw 5</button>
              <button type="button" class="btn" onclick="clearHand()">Clear</button>
            </div>

            <span class="btn-group-label">Hearts</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="addCard('ace','hearts')">A</button>
              <button type="button" class="btn" onclick="addCard('2','hearts')">2</button>
              <button type="button" class="btn" onclick="addCard('3','hearts')">3</button>
              <button type="button" class="btn" onclick="addCard('4','hearts')">4</button>
              <button type="button" class="btn" onclick="addCard('5','hearts')">5</button>
            </div>

            <span class="btn-group-label">Spades</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="addCard('ace','spades')">A</button>
              <button type="button" class="btn" onclick="addCard('2','spades')">2</button>
              <button type="button" class="btn" onclick="addCard('3','spades')">3</button>
              <button type="button" class="btn" onclick="addCard('4','spades')">4</button>
              <button type="button" class="btn" onclick="addCard('5','spades')">5</button>
            </div>

            <span class="btn-group-label">Diamonds</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="addCard('ace','diamonds')">A</button>
              <button type="button" class="btn" onclick="addCard('2','diamonds')">2</button>
              <button type="button" class="btn" onclick="addCard('3','diamonds')">3</button>
              <button type="button" class="btn" onclick="addCard('4','diamonds')">4</button>
              <button type="button" class="btn" onclick="addCard('5','diamonds')">5</button>
            </div>

            <span class="btn-group-label">Clubs</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="addCard('ace','clubs')">A</button>
              <button type="button" class="btn" onclick="addCard('2','clubs')">2</button>
              <button type="button" class="btn" onclick="addCard('3','clubs')">3</button>
              <button type="button" class="btn" onclick="addCard('4','clubs')">4</button>
              <button type="button" class="btn" onclick="addCard('5','clubs')">5</button>
            </div>
          </div>
        </aside>

        <canvas width="800" height="800" id="world"></canvas>

        <aside class="window" id="right-panel">
          <header class="title-bar">
            <button type="button" class="close hidden"><span>Close</span></button>
            <span class="title">Log</span>
            <button type="button" class="minimize" aria-label="Minimize"><span>Minimize</span></button>
          </header>
          <div class="window-pane">
            <p>Game log empty.</p>
          </div>
        </aside>
      </div>
    </div>
    <div id="hand"></div>
  </body>
</html>
