<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AbyssalCards</title>
    <link rel="stylesheet" href="css/modern-normalize.css">
    <link rel="stylesheet" href="css/system.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/lib/vivus.js"></script>
    <script src="js/lib/isomer.js"></script>
    <script type="module" src="js/main.js"></script>
  </head>
  <body>
    <div id="game-ui">
      <header class="title-bar">
        <button type="button" class="close hidden"><span>Close</span></button>
        <span class="title" style="color:white">AbyssalCards</span>
        <button type="button" class="resize hidden"><span>Resize</span></button>
      </header>

      <div id="controls">
        <div id="resources">
          <div class="resource" id="mana-display">
            <span class="resource-label">Mana</span>
            <span class="resource-value" id="mana">0</span>
          </div>
          <div class="resource" id="energy-display">
            <span class="resource-label">Energy</span>
            <span class="resource-value" id="energy">0</span>
          </div>
          <div class="resource" id="control-display">
            <span class="resource-label">Control</span>
            <span class="resource-value" id="control">0</span>
          </div>
        </div>
      </div>

      <div id="board-layout">
        <aside class="window" id="left-panel">
          <header class="title-bar">
            <button type="button" class="close hidden"><span>Close</span></button>
            <span class="title">Programs</span>
            <button type="button" class="minimize" aria-label="Minimize"><span>Minimize</span></button>
          </header>
          <div class="window-pane">
            <span class="btn-group-label">Cards</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="addCard('ace', null)">Draw Ace</button>
              <button type="button" class="btn" onclick="hand.innerHTML = '';">Clear</button>
            </div>

            <span class="btn-group-label">Modify Rank</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="shiftRank(-1)">-</button>
              <button type="button" class="btn" onclick="shiftRank(1)">+</button>
            </div>
            <span class="btn-group-label">Modify Suite</span>
            <div class="btn-group">
              <button type="button" class="btn" onclick="modifySelectedCard({suite:'hearts'})">♥</button>
              <button type="button" class="btn" onclick="modifySelectedCard({suite:'spades'})">♠</button>
              <button type="button" class="btn" onclick="modifySelectedCard({suite:'diamonds'})">♦</button>
              <button type="button" class="btn" onclick="modifySelectedCard({suite:'clubs'})">♣</button>
            </div>
          </div>
        </aside>

        <canvas width="800" height="800" id="world"></canvas>

        <aside class="window" id="right-panel">
          <header class="title-bar">
            <button type="button" class="close hidden"><span>Close</span></button>
            <span class="title">Data</span>
            <button type="button" class="minimize" aria-label="Minimize"><span>Minimize</span></button>
          </header>
          <div class="window-pane">
            <p>No data</p>
          </div>
        </aside>
      </div>
    </div>
    <div id="hand"></div>
  </body>
</html>
